<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA — "Thêm vào màn hình chính" (TMH AI BUSINESS) ──────────────
         Manifest + icon cho Android/Chrome; bộ meta apple-* + apple-touch-icon
         cho iOS Safari (iOS bỏ qua icon trong manifest, chỉ dùng apple-touch-icon).
         display=standalone → mở full-screen, không thanh địa chỉ, như app thật. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0B0C14" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TMH AI CENTER" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet" />
    <!-- FIX 2026-05-27: Vietnamese-friendly fonts. Be Vietnam Pro handles
         VN diacritics correctly (xương khớp / ếô). Lora for diary-italic
         body. Both Google Fonts free, latin + vietnamese subsets. -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
    <!-- Studio Brand Kit FONT_WHITELIST — TikTok Shop renders kit
         previews using these families, so they must be available globally.
         Plus Jakarta Sans + Be Vietnam Pro + DM Sans are already loaded
         above; add the rest. -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Poppins:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Z98 #5 — hand-drawn font for the local stickers (has Vietnamese subset). -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
    <title>TMH AI CENTER</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
